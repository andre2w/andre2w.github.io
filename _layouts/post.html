---
layout: default
---

<div class="post">
  <hgroup>
    <h1>{{ page.title }}</h1>
    <h2>{{ page.date | date_to_string }}</h2>
  </hgroup>
  {{ content }}

</div>

<div class="related">
  <h2>Related Posts</h2>
  <ul class="related-posts">
    {% for post in site.related_posts limit:3 %}
      <li>
        <hgroup>
          <h4>
            <a href="{{ site.baseurl }}{{ post.url }}">
              {{ post.title }}
            </a>
          </h4>
          <h5>{{ post.date | date_to_string }}</h5>
        </hgroup>
      </li>
    {% endfor %}
  </ul>
</div>
